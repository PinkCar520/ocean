version: '3.8'

services:
  # UClaw AI 网关总线 (NestJS + Prisma 7)
  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    container_name: uclaw-gateway
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/uclaw?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - VLLM_API_BASE=${VLLM_API_BASE:-http://host.docker.internal:11434/v1}
      - VLLM_API_KEY=${VLLM_API_KEY:-mock-key}
      - ZENTAO_BASE_URL=http://zentao:80
      - ZENTAO_API_TOKEN=${ZENTAO_API_TOKEN:-your-admin-token}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  # 用户中心持久化核心 (影子用户, 偏好, 会话漫游)
  postgres:
    image: postgres:16-alpine
    container_name: uclaw-postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=uclaw
    ports:
      - "5432:5432"
    volumes:
      - uclaw_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 禅道 Web 服务 (集成测试环境)
  zentao:
    image: easysoft/zentao:latest
    container_name: uclaw-zentao
    restart: always
    ports:
      - "8080:80"
    environment:
      - MYSQL_HOST=zentao-db
      - MYSQL_PORT=3306
      - MYSQL_USER=zentao
      - MYSQL_PASSWORD=zentao_pass
      - MYSQL_DATABASE=zentao
    volumes:
      - uclaw_zentao_data:/www/zentaopms
    depends_on:
      zentao-db:
        condition: service_healthy

  # 禅道专用数据库
  zentao-db:
    image: mariadb:10.6
    container_name: uclaw-zentao-db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=root_pass
      - MYSQL_DATABASE=zentao
      - MYSQL_USER=zentao
      - MYSQL_PASSWORD=zentao_pass
    volumes:
      - uclaw_zentao_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "zentao", "-pzentao_pass"]
      interval: 5s
      timeout: 5s
      retries: 10

  # 会话记忆与流控层 (Redis)
  redis:
    image: redis:7-alpine
    container_name: uclaw-redis
    ports:
      - "6379:6379"
    volumes:
      - uclaw_redis_data:/data

volumes:
  uclaw_postgres_data:
  uclaw_redis_data:
  uclaw_zentao_data:
  uclaw_zentao_mysql:
