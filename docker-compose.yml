version: '3.8'

services:
  # UClaw AI 网关总线
  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    container_name: uclaw-gateway
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - VLLM_API_BASE=${VLLM_API_BASE:-http://host.docker.internal:8000/v1}
      - VLLM_API_KEY=${VLLM_API_KEY:-mock-key}
    depends_on:
      - redis

  # 禅道 Web 服务
  zentao:
    image: easysoft/zentao:latest
    container_name: uclaw-zentao
    restart: always
    ports:
      - "8080:80"
    environment:
      - MYSQL_HOST=zentao-db
      - MYSQL_PORT=3306
      - MYSQL_USER=zentao
      - MYSQL_PASSWORD=zentao_pass
      - MYSQL_DATABASE=zentao
    volumes:
      - uclaw_zentao_data:/www/zentaopms
    depends_on:
      zentao-db:
        condition: service_healthy

  # 禅道专用数据库 (显式拉出来，确保稳定性)
  zentao-db:
    image: mariadb:10.6
    container_name: uclaw-zentao-db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=root_pass
      - MYSQL_DATABASE=zentao
      - MYSQL_USER=zentao
      - MYSQL_PASSWORD=zentao_pass
    volumes:
      - uclaw_zentao_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "zentao", "-pzentao_pass"]
      interval: 5s
      timeout: 5s
      retries: 10

  # 会话记忆与流控层
  redis:
    image: redis:7-alpine
    container_name: uclaw-redis
    ports:
      - "6379:6379"
    volumes:
      - uclaw_redis_data:/data

volumes:
  uclaw_redis_data:
  uclaw_zentao_data:
  uclaw_zentao_mysql:
