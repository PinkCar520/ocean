name: Build and Push Docker Images
permissions:
  contents: read

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'apps/gateway/**'
      - 'apps/web/**'
      - 'packages/**'
      - 'docker-compose.yml'
      - 'docker-compose.prod.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prep:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

  build-and-push-gateway:
    name: Build and Push Gateway Image
    needs: prep
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Check for gateway changes
        id: check_gateway
        uses: dorny/paths-filter@v4
        with:
          filters: |
            gateway:
              - 'apps/gateway/**'
              - 'packages/**'
              - 'docker-compose.prod.yml'

      - name: Log in to Docker Hub
        if: steps.check_gateway.outputs.gateway == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        if: steps.check_gateway.outputs.gateway == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata
        if: steps.check_gateway.outputs.gateway == 'true'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/uclaw-gateway
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.prep.outputs.sha_short }}

      - name: Build and push Gateway Docker image
        if: steps.check_gateway.outputs.gateway == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./apps/gateway/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-web:
    name: Build and Push Web Image
    needs: prep
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check for web changes
        id: check_web
        uses: dorny/paths-filter@v4
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/**'

      - name: Log in to Docker Hub
        if: steps.check_web.outputs.web == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        if: steps.check_web.outputs.web == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata
        if: steps.check_web.outputs.web == 'true'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/uclaw-web
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.prep.outputs.sha_short }}

      - name: Build and push Web Docker image
        if: steps.check_web.outputs.web == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          build-args: |
            CACHE_BUST=${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Auto Deploy to Server
    needs: [build-and-push-gateway, build-and-push-web]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Pull and Restart Containers
        run: |
          cd ~/uclaw 2>/dev/null || cd ~/uclaw
          docker compose pull
          docker compose down
          docker compose up -d
          docker image prune -f
